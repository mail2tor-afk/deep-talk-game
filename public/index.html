<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepTalk - Safe Harbor</title>
  <meta name="description" content="สร้างวงสนทนาที่ปลอดภัยบนมือถือ 🔒">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .landing-card {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(150deg, #16292f 0%, #1d3640 55%, #193038 100%);
      border: 1.5px solid rgba(122, 200, 188, 0.25);
      border-radius: 26px;
      padding: 36px 30px;
      box-shadow: 0 24px 60px rgba(22, 41, 47, 0.35);
      position: relative;
      overflow: hidden;
    }

    .landing-card::before {
      content: '';
      position: absolute;
      top: -90px;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
      height: 240px;
      background: radial-gradient(ellipse, rgba(77, 182, 164, 0.26), transparent 70%);
      pointer-events: none;
    }

    .logo-container {
      text-align: center;
      position: relative;
      margin-bottom: 30px;
    }

    .logo-emoji {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      background: var(--primary);
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 26px rgba(77, 182, 164, 0.4);
    }

    .logo-title {
      font-family: 'Kanit';
      font-size: 30px;
      font-weight: 700;
      color: #eef7f4;
      line-height: 1;
    }

    .logo-subtitle {
      font-size: 13.5px;
      color: #9cc0b8;
      margin-top: 8px;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-label {
      font-family: 'Kanit';
      font-size: 13.5px;
      color: #9cc0b8;
      margin-bottom: 10px;
      display: block;
    }

    .form-input {
      width: 100%;
      height: 50px;
      background: rgba(255, 255, 255, 0.06);
      border: 1.5px solid rgba(122, 200, 188, 0.25);
      border-radius: 12px;
      padding: 0 16px;
      color: #eef7f4;
      font-family: 'IBM Plex Sans Thai';
      font-size: 15.5px;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.09);
      box-shadow: 0 0 12px rgba(77, 182, 164, 0.25);
    }

    .submit-btn {
      width: 100%;
      height: 52px;
      background: var(--primary);
      color: #0e1a1f;
      font-family: 'Kanit';
      font-size: 17px;
      font-weight: 600;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 18px rgba(77, 182, 164, 0.3);
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(77, 182, 164, 0.45);
    }

    .journal-link {
      display: block;
      text-align: center;
      font-family: 'Kanit';
      font-size: 14px;
      color: #cfe6e0;
      text-decoration: none;
      margin-top: 28px;
      transition: all 0.2s ease;
    }

    .journal-link:hover {
      color: var(--primary);
      text-decoration: underline;
    }

    footer {
      text-align: center;
      font-size: 11.5px;
      color: #7fa399;
      margin-top: 32px;
    }
  </style>
</head>
<body>

  <div class="landing-card">
    <div class="logo-container">
      <div class="logo-emoji">🔮</div>
      <div class="logo-title">DeepTalk</div>
      <div class="logo-subtitle">สร้างวงสนทนาที่ปลอดภัยบนมือถือ 🔒</div>
    </div>

    <!-- DIRECT HOST ROOM CREATION FORM -->
    <form onsubmit="handleCreateSubmit(event)">
      <div class="form-group">
        <label class="form-label" for="host-name">ระบุชื่อเล่นของคุณ (โฮสต์)</label>
        <input type="text" id="host-name" class="form-input" placeholder="เช่น ฟ้า, โบ๊ท" required maxlength="15" autofocus>
      </div>

      <button type="submit" class="submit-btn">สร้างห้องเล่นเกม ➔</button>
    </form>

    <a href="journal.html" class="journal-link">🌙 สมุดทบทวนเดี่ยว (Solo Journal)</a>
  </div>

  <footer>
    DeepTalk · Safe Harbor Theme<br>
    บทสนทนาที่ปลอดภัย ไม่มีใครรู้ว่าใครตอบ 🔒
  </footer>

  <script>
    function handleCreateSubmit(e) {
      e.preventDefault();
      const name = document.getElementById('host-name').value.trim();
      
      sessionStorage.setItem('create_room', 'true');
      sessionStorage.setItem('join_player_name', name);
      sessionStorage.setItem('is_host', 'true');
      window.location.href = 'player.html';
    }
  </script>
</body>
</html>
