<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepTalk - Dual Device Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f1c20;
      color: #eef7f4;
      font-family: 'Kanit', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .sim-header {
      background: #16292f;
      border-bottom: 1.5px solid rgba(122, 200, 188, 0.25);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .sim-title {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sim-badge {
      background: var(--primary);
      color: #0e1a1f;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .sim-workspace {
      display: flex;
      flex: 1;
      justify-content: center;
      align-items: center;
      gap: 40px;
      padding: 20px;
      background: radial-gradient(circle at 50% 50%, #1a3037 0%, #0f1c20 100%);
      overflow-y: auto;
    }

    .phone-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .phone-label {
      font-size: 14px;
      color: #8fb3aa;
      font-weight: 500;
    }

    .phone-frame {
      width: 375px;
      height: 760px;
      background: #000;
      border-radius: 40px;
      border: 10px solid #2d3e40;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 4px #1a2a2d;
      overflow: hidden;
      position: relative;
    }

    .phone-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #16292f;
    }

    /* Simulate dynamic island on left and right frames */
    .phone-island {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 28px;
      background: #000;
      border-radius: 15px;
      z-index: 1000;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <header class="sim-header">
    <div class="sim-title">
      🔮 DeepTalk - Dual Device Simulator <span class="sim-badge">Dev Mode</span>
    </div>
    <div style="font-size: 13.5px; color: #8fb3aa;">
      จำลองทดสอบระบบแบบสองมือถือฝั่ง Host และ Player เพื่อตรวจสอบความคุ้นชิน
    </div>
  </header>

  <main class="sim-workspace">
    
    <!-- Phone 1: Host -->
    <div class="phone-container">
      <div class="phone-label">📱 เครื่องที่ 1 (ใช้เพื่อกดสร้างห้อง / เป็นโฮสต์)</div>
      <div class="phone-frame">
        <div class="phone-island"></div>
        <iframe src="index.html" class="phone-iframe"></iframe>
      </div>
    </div>

    <!-- Phone 2: Player -->
    <div class="phone-container">
      <div class="phone-label">📱 เครื่องที่ 2 (ฝั่งผู้เล่นเกสต์ - วางลิงก์เพื่อเข้าร่วม)</div>
      <div style="display: flex; gap: 8px; width: 375px; margin-bottom: 8px;">
        <input type="text" id="guest-url-input" placeholder="วางลิงก์ที่ได้รับจาก Host ที่นี่..." style="flex: 1; height: 32px; background: rgba(255,255,255,0.08); border: 1.5px solid rgba(122,200,188,0.25); border-radius: 8px; color: #fff; padding: 0 10px; font-size: 13px;">
        <button onclick="loadGuestUrl()" style="height: 32px; background: var(--primary); color: #0e1a1f; border: none; border-radius: 8px; padding: 0 12px; font-family: 'Kanit'; font-size: 13px; font-weight: 500; cursor: pointer;">โหลดลิงก์</button>
      </div>
      <div class="phone-frame">
        <div class="phone-island"></div>
        <iframe id="guest-iframe" src="index.html" class="phone-iframe"></iframe>
      </div>
    </div>

  </main>

  <script>
    function loadGuestUrl() {
      const url = document.getElementById('guest-url-input').value.trim();
      if (url) {
        document.getElementById('guest-iframe').src = url;
      } else {
        alert("กรุณากรอกลิงก์เชิญก่อน");
      }
    }
  </script>

</body>
</html>
