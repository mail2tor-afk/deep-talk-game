<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reflection Space - Solo Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/journal.css">
  <style>
    body {
      background: #16292f;
      font-family: 'IBM Plex Sans Thai', sans-serif;
      margin: 0;
      padding: 0;
      color: #eef7f4;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
      position: relative;
    }

    .journal-outer-wrap {
      width: 100%;
      max-width: 440px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 56px 20px 34px; /* safe areas for dynamic island and home bar */
      position: relative;
    }

    .journal-outer-wrap::before {
      content: '';
      position: absolute;
      top: -90px;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
      height: 230px;
      background: radial-gradient(ellipse, rgba(77, 182, 164, 0.24), transparent 70%);
      pointer-events: none;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      position: relative;
      z-index: 10;
    }

    .nav-link {
      font-family: 'Kanit';
      font-size: 15px;
      color: #9cc0b8;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
    }

    .nav-title {
      font-family: 'Kanit';
      font-size: 18px;
      font-weight: 600;
      color: #eef7f4;
    }

    .nav-icon {
      font-size: 18px;
      cursor: pointer;
      color: #9cc0b8;
    }

    .journal-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      z-index: 10;
    }

    .mood-title {
      font-family: 'Kanit';
      font-size: 15px;
      color: #cfe6e0;
      margin-bottom: 11px;
    }

    .mood-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(122, 200, 188, 0.25);
      border-radius: 50%;
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 26px;
      transition: all 0.25s ease;
      padding: 0;
    }

    .mood-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .mood-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .mood-item-label {
      font-size: 11px;
      color: #8fb3aa;
      font-weight: 400;
    }

    .mood-item.selected .mood-item-label {
      color: #eef7f4;
      font-weight: 500;
    }

    .journal-card-prompt {
      border: 1px solid rgba(122, 200, 188, 0.45);
      background: rgba(255, 255, 255, 0.06);
      border-radius: 18px;
      padding: 18px 20px;
      box-shadow: 0 0 18px rgba(77, 182, 164, 0.16);
      animation: safeGlow 4s ease-in-out infinite;
      position: relative;
    }

    .card-prompt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .card-prompt-label {
      font-family: 'Kanit';
      font-size: 11px;
      color: var(--primary);
      letter-spacing: 1px;
    }

    .card-prompt-refresh {
      font-family: 'Kanit';
      font-size: 12px;
      color: #9cc0b8;
      cursor: pointer;
      user-select: none;
    }

    .card-prompt-refresh:hover {
      color: var(--primary);
    }

    .card-prompt-question {
      font-family: 'Kanit';
      font-size: 19.5px;
      font-weight: 500;
      color: #f4faf8;
      line-height: 1.45;
    }

    .card-prompt-question-en {
      font-size: 13px;
      color: #9cc0b8;
      margin-top: 6px;
      line-height: 1.4;
    }

    .journal-input-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .journal-textarea {
      width: 100%;
      min-height: 140px;
      flex: 1;
      border: 1.5px solid rgba(122, 200, 188, 0.3);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      padding: 16px;
      color: #cae3dc;
      font-family: 'IBM Plex Sans Thai';
      font-size: 15px;
      line-height: 1.6;
      resize: none;
      transition: all 0.3s ease;
    }

    .journal-textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 15px rgba(77, 182, 164, 0.25);
    }

    .sentiment-banner {
      display: flex;
      align-items: center;
      gap: 11px;
      background: rgba(122, 200, 188, 0.1);
      border: 1px solid rgba(122, 200, 188, 0.28);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 13.5px;
      color: #cfe6e0;
      line-height: 1.4;
    }

    .save-btn {
      background: var(--primary);
      color: #0e1a1f;
      font-family: 'Kanit';
      font-size: 17px;
      font-weight: 600;
      padding: 15px;
      border-radius: 16px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(77, 182, 164, 0.3);
      transition: all 0.3s ease;
      border: none;
      width: 100%;
    }

    .save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(77, 182, 164, 0.45);
    }

    .log-item-card {
      border: 1px solid rgba(122, 200, 188, 0.25);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      position: relative;
    }

    .log-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 9px;
    }

    .log-item-meta {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .log-item-emoji {
      font-size: 24px;
    }

    .log-item-date {
      font-family: 'Kanit';
      font-size: 13px;
      color: #9cc0b8;
    }

    .log-item-delete {
      font-size: 16px;
      color: #ff9c9c;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    .log-item-delete:hover {
      background: rgba(255, 156, 156, 0.15);
    }

    .log-item-question {
      font-size: 14px;
      color: #e8f3f0;
      line-height: 1.45;
      margin-bottom: 9px;
      font-weight: 500;
    }

    .log-item-content {
      font-size: 13.5px;
      color: #bcdbd3;
      line-height: 1.5;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }

    .log-item-tag {
      display: inline-block;
      font-family: 'Kanit';
      font-size: 11px;
      border-radius: 10px;
      padding: 3px 10px;
    }
  </style>
</head>
<body>

  <div class="journal-outer-wrap">
    
    <!-- NAVIGATION BAR -->
    <header class="nav-bar">
      <a href="index.html" class="nav-link">‹ กลับ</a>
      <div class="nav-title" id="journal-view-title">สมุดทบทวน 🌙</div>
      <span class="nav-icon" id="journal-toggle-view" title="ดูบันทึกย้อนหลัง">📚</span>
    </header>

    <!-- JOURNAL WORKSPACE VIEW -->
    <main class="journal-main" id="view-write">
      
      <!-- Mood selector -->
      <div>
        <div class="mood-title">วันนี้รู้สึกยังไง?</div>
        <div style="display: flex; justify-content: space-between;" id="mood-selector">
          <div class="mood-item" data-mood="great">
            <button class="mood-btn">😄</button>
            <span class="mood-item-label">ดีมาก</span>
          </div>
          <div class="mood-item selected" data-mood="good">
            <button class="mood-btn" style="border-color: var(--primary); box-shadow: 0 0 16px rgba(77, 182, 164, 0.5);">🙂</button>
            <span class="mood-item-label">ดี</span>
          </div>
          <div class="mood-item" data-mood="neutral">
            <button class="mood-btn">😐</button>
            <span class="mood-item-label">เฉย ๆ</span>
          </div>
          <div class="mood-item" data-mood="sad">
            <button class="mood-btn">😔</button>
            <span class="mood-item-label">เศร้า</span>
          </div>
          <div class="mood-item" data-mood="anxious">
            <button class="mood-btn">😰</button>
            <span class="mood-item-label">กังวล</span>
          </div>
        </div>
      </div>

      <!-- Prompt card -->
      <div class="journal-card-prompt">
        <div class="card-prompt-header">
          <span class="card-prompt-label">คำถามชวนคิด · ระดับ 3</span>
          <span class="card-prompt-refresh" id="refresh-prompt-btn">🔄 สุ่มใหม่</span>
        </div>
        <div class="card-prompt-question" id="prompt-text-th">กำลังดึงคำถาม...</div>
        <div class="card-prompt-question-en" id="prompt-text-en">Loading prompt...</div>
      </div>

      <!-- Input area -->
      <div class="journal-input-wrap">
        <textarea id="journal-input" class="journal-textarea" placeholder="วันนี้ฉันลองนึกย้อนกลับไป..."></textarea>
        
        <div class="sentiment-banner" id="sentiment-banner" style="display: none;">
          <span style="width: 10px; height: 10px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 8px var(--primary);"></span>
          <div>🧭 วิเคราะห์: <b id="sentiment-text" style="color: #eef7f4;">ทบทวนใคร่ครวญตนเอง</b></div>
        </div>
      </div>

      <button class="save-btn" id="save-journal-btn">บันทึกความรู้สึกนี้</button>

    </main>

    <!-- HISTORICAL LOGS LIST VIEW -->
    <main class="journal-main" id="view-history" style="display: none;">
      <div style="font-family: 'Kanit'; font-size: 15px; color: #cfe6e0; margin-bottom: 8px;">คลังบันทึกที่บันทึกไว้ในเครื่องของคุณ:</div>
      
      <div style="flex: 1; overflow-y: auto; padding-right: 4px;" id="logs-list-container">
        <!-- Logs injected dynamically here -->
      </div>
    </main>

    <!-- Home indicator gesture bar simulation -->
    <div style="flex:none; height:24px; display:flex; align-items:center; justify-content:center; position:relative; z-index:6;"><span style="width:108px; height:4px; border-radius:2px; background:rgba(238,247,244,0.35);"></span></div>
  </div>

  <!-- SCRIPT IMPORTS -->
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/journal.js"></script>
</body>
</html>
